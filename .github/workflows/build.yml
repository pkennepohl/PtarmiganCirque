name: Build Executables

# Trigger: manually, or automatically on every versioned tag (e.g. v1.0.0)
on:
  workflow_dispatch:        # Manual run from GitHub Actions tab
  push:
    tags:
      - 'v*.*.*'            # e.g. git tag v1.0.0 && git push --tags

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: Binah-Windows
            exe_path: dist/Binah.exe

          - os: macos-latest
            artifact: Binah-macOS
            exe_path: dist/Binah

          - os: ubuntu-latest
            artifact: Binah-Linux
            exe_path: dist/Binah

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      # ── 1. Check out source ───────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Linux: install tkinter & display (needed for matplotlib/tk) ────
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk libglib2.0-0 libsm6 libxrender1 libxext6

      # ── 4. Install Python dependencies ───────────────────────────────────
      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          pip install matplotlib numpy scipy xraylarch h5py seaborn pillow
          pip install git+https://github.com/Beamlines-CanadianLightSource/SGMPython.git || true

      # ── 5. Build with PyInstaller ─────────────────────────────────────────
      - name: Build executable
        run: pyinstaller binah.spec

      # ── 6. Upload artifact (available for download from Actions tab) ──────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.exe_path }}
          retention-days: 30

  # ── After all builds succeed: attach to GitHub Release ───────────────────
  release:
    name: Attach to Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
